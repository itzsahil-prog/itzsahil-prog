name: Auto Update Projects

on:
  schedule:
    - cron: "0 0 * * *"   # Runs daily at midnight
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Install jq
        run: sudo apt-get install jq -y

      - name: Fetch Latest Repos
        run: |
          curl -s "https://api.github.com/users/itzsahil-prog/repos?sort=updated&per_page=100" > repos.json

      - name: Generate Projects Section
        run: |
          echo "## 🚀 Latest Projects" > PROJECTS.md
          echo "" >> PROJECTS.md

          cat repos.json | jq -r '
            .[] 
            | select(.fork == false) 
            | "- 🔹 [" + .name + "](" + .html_url + ") - " + (.description // "No description") + " ⭐" + (.stargazers_count|tostring)
          ' | head -n 6 >> PROJECTS.md

      - name: Update README Section Safely
        run: |
          awk '
          /<!-- PROJECTS_START -->/ {
              print;
              system("cat PROJECTS.md");
              skip=1;
              next
          }
          /<!-- PROJECTS_END -->/ {
              skip=0
          }
          !skip
          ' README.md > temp.md

          mv temp.md README.md

      - name: Commit & Push Changes
        run: |
          git config --global user.name "Sahil Goyal"
          git config --global user.email "itsahilg1@gmail.com"
          git add README.md
          git commit -m "🔄 Auto-update latest projects" || echo "No changes"
          git push
