name: Auto Update Projects

on:
  schedule:
    - cron: "0 0 * * *"   # daily
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Fetch & Format Projects
        run: |
          echo "## 🚀 Latest Projects" > projects_section.md
          echo "" >> projects_section.md

          curl -s "https://api.github.com/users/itzsahil-prog/repos?sort=updated&per_page=100" \
          | jq -r '
            .[]
            | select(.fork == false and .visibility == "public")
            | "- 🔹 [" + .name + "](" + .html_url + ") — " 
              + (.description // "No description") 
              + " ⭐" + (.stargazers_count|tostring)
          ' | head -n 6 >> projects_section.md

      - name: Inject into README
        run: |
          sed -i '/<!-- PROJECTS_START -->/,/<!-- PROJECTS_END -->/c\
<!-- PROJECTS_START -->\
'"$(cat projects_section.md)"'\
<!-- PROJECTS_END -->' README.md

      - name: Commit & Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add README.md
          git commit -m "🔄 Auto-update latest projects" || echo "No changes"
          git push
